<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage Logistics - Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3EV%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --color-background: #050608;
            --color-secondary-background: #090B10;
            --color-panel-background: rgba(12, 16, 24, 0.72);
            --color-elevated-surface: #121722;
            --color-accent-blue: #3B82F6;
            --color-primary-text: #FFFFFF;
            --color-secondary-text: #AAB3C2;
            --color-muted-text: #727C89;
            --color-borders: rgba(255, 255, 255, 0.06);
            --color-error: #F87171;
            --color-success: #34D399;
            --color-warning: #FBBF24;

            --font-family-primary: 'Montserrat', sans-serif;
            --font-family-secondary: 'Roboto', sans-serif;

            --card-radius: 20px;
            --panel-radius: 28px;
            --header-height: 88px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { background-color: var(--color-background); }

        body {
            font-family: var(--font-family-secondary);
            color: var(--color-primary-text);
            background-color: var(--color-background);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }
        button { font-family: inherit; }

        h1, h2, h3, h4 {
            font-family: var(--font-family-primary);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* --- Loading / gate screen shown while checking the session --- */
        #auth-gate {
            position: fixed; inset: 0; background: var(--color-background);
            display: flex; align-items: center; justify-content: center;
            z-index: 5000; flex-direction: column; gap: 1rem;
        }
        .gate-spinner {
            width: 34px; height: 34px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--color-accent-blue);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #auth-gate p { color: var(--color-muted-text); font-size: 0.9rem; }

        #app { display: none; }
        #app.is-ready { display: block; }

        /* --- Header --- */
        .header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            height: var(--header-height); padding: 0 2.5rem;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--color-borders);
        }
        
        /* New Logo Styles */
        .logo { display: flex; align-items: center; }
        .brand-logo {
            height: 48px; /* Adjust height as needed to fit your header perfectly */
            width: auto;
            object-fit: contain;
            display: block;
        }

        .hamburger-trigger {
            display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--color-borders);
            border-radius: 12px; 
            cursor: pointer; 
            transition: border-color 0.25s ease, background 0.25s ease;
            color: var(--color-primary-text);
        }
        .hamburger-trigger:hover {
            border-color: rgba(59,130,246,0.35); 
            background: rgba(255,255,255,0.05);
        }
        .hamburger-trigger svg {
            width: 20px; height: 20px;
        }

        /* --- Account drawer --- */
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(2,3,5,0.6);
            backdrop-filter: blur(4px); z-index: 900;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .drawer-overlay.is-open { opacity: 1; visibility: visible; }

        .account-drawer {
            position: fixed; top: 0; right: 0; height: 100vh; width: 320px; max-width: 88vw;
            background: #0B0E14; border-left: 1px solid var(--color-borders);
            z-index: 950; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.25,1,0.5,1);
            box-shadow: -20px 0 60px rgba(0,0,0,0.5);
        }
        .account-drawer.is-open { transform: translateX(0); }

        .drawer-top { padding: 1.5rem 1.25rem 0.75rem; display: flex; justify-content: space-between; align-items: center; }
        
        /* Drawer Logo Style */
        .drawer-brand-logo {
            height: 38px;
            width: auto;
            object-fit: contain;
        }

        .drawer-close {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--color-borders);
            background: rgba(255,255,255,0.03); color: var(--color-secondary-text);
            font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .drawer-close:hover { color: var(--color-primary-text); border-color: rgba(255,255,255,0.2); }

        .drawer-contact-info {
            padding: 0.25rem 1.25rem 1.25rem;
            display: flex; flex-direction: column; gap: 0.65rem;
        }
        .drawer-contact-row {
            display: flex; align-items: center; gap: 0.75rem;
            font-size: 0.85rem; color: var(--color-secondary-text);
        }
        .drawer-contact-row svg {
            width: 15px; height: 15px; stroke: var(--color-muted-text);
            flex-shrink: 0;
        }

        .drawer-section { padding: 0.75rem 0.9rem; }
        .drawer-divider { height: 1px; background: var(--color-borders); margin: 0.4rem 1.25rem; }

        .drawer-link {
            display: flex; align-items: center; gap: 0.85rem; width: 100%;
            padding: 0.8rem 0.85rem; border-radius: 12px; border: none; background: none;
            color: var(--color-secondary-text); font-size: 0.92rem; font-weight: 500;
            cursor: pointer; text-align: left; transition: background 0.2s ease, color 0.2s ease;
        }
        .drawer-link:hover { background: rgba(255,255,255,0.04); color: var(--color-primary-text); }
        .drawer-link svg { width: 18px; height: 18px; stroke: currentColor; flex-shrink: 0; }
        .drawer-link.accent { color: var(--color-accent-blue); }
        .drawer-link.danger { color: var(--color-error); }
        .drawer-link.danger:hover { background: rgba(248,113,113,0.08); }

        .drawer-spacer { flex: 1; }

        .drawer-identity {
            display: flex; align-items: center; gap: 0.85rem;
            padding: 1rem 1.25rem; border-top: 1px solid var(--color-borders);
            background: rgba(255,255,255,0.02);
        }
        .drawer-identity-avatar {
            width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, rgba(59,130,246,0.4), rgba(59,130,246,0.1));
            border: 1px solid rgba(59,130,246,0.4);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-family-primary); font-weight: 700; font-size: 0.85rem;
        }
        .drawer-identity-text { overflow: hidden; }
        .drawer-identity-name { font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Layout --- */
        .dashboard-main { max-width: 1160px; margin: 0 auto; padding: 2.75rem 2rem 5rem; }
        .page-heading { margin-bottom: 2.25rem; }
        .page-heading p { color: var(--color-secondary-text); margin-top: 0.4rem; font-size: 0.95rem; }

        .grid-layout { display: grid; grid-template-columns: 1fr 1.7fr; gap: 1.5rem; align-items: start; }

        .panel {
            background: var(--color-panel-background);
            border: 1px solid var(--color-borders);
            border-radius: var(--panel-radius);
            padding: 1.75rem;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        }
        .panel h3 { font-size: 1.05rem; margin-bottom: 1.25rem; }

        /* --- Account overview --- */
        .account-avatar {
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(59,130,246,0.35), rgba(59,130,246,0.08));
            border: 1px solid rgba(59,130,246,0.4);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-family-primary); font-weight: 700; font-size: 1.25rem;
            margin-bottom: 1rem;
        }
        .account-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }

        .account-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 0; border-bottom: 1px solid var(--color-borders);
            font-size: 0.88rem;
        }
        .account-row:last-child { border-bottom: none; }
        .account-row span:first-child { color: var(--color-muted-text); }
        .account-row span:last-child { font-weight: 600; text-align: right; word-break: break-all; margin-left: 1rem; }

        .plan-badge {
            display: inline-block; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--color-accent-blue); background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.3); border-radius: 999px;
            padding: 0.25rem 0.65rem;
        }

        /* --- Shipments & Tracking Block --- */
        .tracking-widget {
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--color-borders);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        .tracking-widget input {
            background: transparent;
            border: 1px solid var(--color-borders);
            border-radius: 12px;
            padding: 1.15rem 1.25rem;
            color: var(--color-primary-text);
            font-family: var(--font-family-secondary);
            font-size: 0.95rem;
            width: 100%;
            outline: none;
            transition: border-color 0.25s ease;
        }
        .tracking-widget input::placeholder {
            color: var(--color-muted-text);
        }
        .tracking-widget input:focus {
            border-color: rgba(59,130,246,0.5);
        }
        .tracking-widget button {
            background: linear-gradient(180deg, rgba(59,130,246,0.1) 0%, rgba(59,130,246,0.25) 100%);
            border: 1px solid rgba(59,130,246,0.6);
            border-radius: 12px;
            padding: 1.15rem;
            color: var(--color-primary-text);
            font-family: var(--font-family-primary);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: all 0.25s ease;
        }
        .tracking-widget button:hover {
            background: linear-gradient(180deg, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0.35) 100%);
        }

        .shipment-list { display: flex; flex-direction: column; gap: 1.1rem; }
        .shipment-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--color-borders);
            border-radius: 16px; padding: 1.25rem 1.35rem 1.5rem;
            transition: border-color 0.25s ease, transform 0.25s ease;
        }
        .shipment-card:hover { border-color: rgba(59,130,246,0.3); transform: translateY(-2px); }

        .shipment-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.4rem; }
        .shipment-main { display: flex; flex-direction: column; gap: 0.25rem; }
        .shipment-ref { font-family: var(--font-family-primary); font-weight: 700; font-size: 0.95rem; }
        .shipment-route { font-size: 0.8rem; color: var(--color-muted-text); }
        .shipment-eta { font-size: 0.78rem; color: var(--color-secondary-text); text-align: right; }
        .shipment-eta strong { display: block; color: var(--color-primary-text); font-size: 0.85rem; }

        /* UPS-style horizontal progress tracker */
        .tracker { display: flex; align-items: flex-start; }
        .tracker-step { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
        .tracker-node {
            width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--color-borders); background: var(--color-elevated-surface);
            color: var(--color-muted-text); z-index: 2;
        }
        .tracker-node svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 3; }
        .tracker-line {
            position: absolute; top: 13px; left: -50%; width: 100%; height: 2px;
            background: var(--color-borders); z-index: 1;
        }
        .tracker-step:first-child .tracker-line { display: none; }

        .tracker-step.is-done .tracker-node { background: var(--color-accent-blue); border-color: var(--color-accent-blue); color: #fff; }
        .tracker-step.is-done .tracker-line { background: var(--color-accent-blue); }
        .tracker-step.is-current .tracker-node {
            background: rgba(59,130,246,0.15); border-color: var(--color-accent-blue); color: var(--color-accent-blue);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
        }
        .tracker-step.is-current .tracker-node::after {
            content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--color-accent-blue);
        }
        .tracker-label {
            margin-top: 0.55rem; font-size: 0.68rem; text-align: center; color: var(--color-muted-text);
            line-height: 1.25; max-width: 72px;
        }
        .tracker-step.is-done .tracker-label, .tracker-step.is-current .tracker-label { color: var(--color-primary-text); font-weight: 600; }

        @media (max-width: 860px) {
            .grid-layout { grid-template-columns: 1fr; }
            .dashboard-main { padding: 2rem 1.25rem 4rem; }
            .header { padding: 0 1.25rem; }
            .tracker-label { font-size: 0.6rem; max-width: 56px; }
        }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="gate-spinner"></div>
        <p>Verifying your session…</p>
    </div>

    <div id="app">
        <header class="header">
            <a href="index.html" class="logo">
                <img src="/logo.jpeg" alt="Vantage Logistics" class="brand-logo">
            </a>

            <button class="hamburger-trigger" id="account-trigger" aria-label="Open menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </header>

        <div class="drawer-overlay" id="drawer-overlay"></div>
        <aside class="account-drawer" id="account-drawer">
            <div class="drawer-top">
                <img src="/logo.jpeg" alt="Vantage Logistics" class="drawer-brand-logo">
                <button class="drawer-close" id="drawer-close" aria-label="Close menu">&times;</button>
            </div>
            
            <div class="drawer-contact-info">
                <div class="drawer-contact-row">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <span id="drawer-email-top">—</span>
                </div>
                <div class="drawer-contact-row">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    <span id="drawer-phone-top">—</span>
                </div>
            </div>

            <div class="drawer-divider" style="margin-top: 0;"></div>

            <div class="drawer-section">
                <button class="drawer-link" data-anchor="#shipments-panel">
                    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><rect x="1" y="6" width="15" height="12"></rect><path d="M16 10h4l3 3v5h-7z"></path><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                    Track a Shipment
                </button>
                <button class="drawer-link" data-anchor="#shipments-panel">
                    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M3 3v18h18"></path><path d="M7 15l4-4 3 3 5-6"></path></svg>
                    All Shipments
                </button>
            </div>

            <div class="drawer-divider"></div>

            <div class="drawer-section">
                <button class="drawer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Account Settings
                </button>
                <button class="drawer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    Help Center
                </button>
                <button class="drawer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M4 4h16v16H4z"></path><path d="M22 6l-10 7L2 6"></path></svg>
                    Contact Us
                </button>
            </div>

            <div class="drawer-divider"></div>

            <div class="drawer-section">
                <button class="drawer-link danger" id="drawer-signout">
                    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg>
                    Sign Out
                </button>
            </div>

            <div class="drawer-spacer"></div>

            <div class="drawer-identity">
                <span class="drawer-identity-avatar" id="drawer-initials">--</span>
                <div class="drawer-identity-text">
                    <div class="drawer-identity-name" id="drawer-name">—</div>
                </div>
            </div>
        </aside>

        <main class="dashboard-main">
            <div class="page-heading">
                <h1 id="page-welcome">Welcome back</h1>
                <p>Track active shipments and manage your account details.</p>
            </div>

            <div class="grid-layout">
                <section class="panel">
                    <h3>Account Overview</h3>
                    <div class="account-avatar" id="account-initials">--</div>
                    <div class="account-name" id="account-name">—</div>

                    <div class="account-row">
                        <span>Plan</span>
                        <span class="plan-badge">Enterprise</span>
                    </div>
                    <div class="account-row">
                        <span>Member Since</span>
                        <span id="account-created">—</span>
                    </div>
                    <div class="account-row">
                        <span>Active Shipments</span>
                        <span>1</span>
                    </div>
                </section>

                <section class="panel" id="shipments-panel">
                    <h3>Shipment Tracking</h3>
                    
                    <div class="tracking-widget">
                        <input type="text" placeholder="Enter routing or tracking reference">
                        <button type="button">TRACK SHIPMENT</button>
                    </div>

                    <div class="shipment-list" id="shipment-list">
                        </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://fpilrrwtuihebjgbozjf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwaWxycnd0dWloZWJqZ2JvempmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTg4NDMsImV4cCI6MjA5ODM5NDg0M30.8UBAaymDxbDUG-oBEulO8-LoM7vP9SRgDyRj99_X3gk';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---- Placeholder shipment data (swap for a real Supabase query later) ----
        // step: index into TRACKER_STEPS below representing current progress
        const TRACKER_STEPS = ['Order\nConfirmed', 'Picked\nUp', 'In\nTransit', 'Out for\nDelivery', 'Delivered'];
        const PLACEHOLDER_SHIPMENTS = [
            { ref: 'VG-48210-NY', route: 'Toronto → New York HQ', eta: 'Jul 12', step: 2 }
        ];

        function renderTracker(currentStep) {
            return TRACKER_STEPS.map((label, i) => {
                const state = i < currentStep ? 'is-done' : i === currentStep ? 'is-current' : '';
                const icon = i < currentStep
                    ? '<svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"></path></svg>'
                    : '';
                return `
                    <div class="tracker-step ${state}">
                        <div class="tracker-node">
                            <div class="tracker-line"></div>
                            ${icon}
                        </div>
                        <div class="tracker-label">${label.replace('\n', '<br>')}</div>
                    </div>
                `;
            }).join('');
        }

        function renderShipments() {
            const list = document.getElementById('shipment-list');
            list.innerHTML = PLACEHOLDER_SHIPMENTS.map(s => `
                <div class="shipment-card">
                    <div class="shipment-head">
                        <div class="shipment-main">
                            <span class="shipment-ref">${s.ref}</span>
                            <span class="shipment-route">${s.route}</span>
                        </div>
                        <div class="shipment-eta">
                            ETA
                            <strong>${s.eta}</strong>
                        </div>
                    </div>
                    <div class="tracker">${renderTracker(s.step)}</div>
                </div>
            `).join('');
        }

        function initials(name) {
            if (!name) return '--';
            return name.split(' ').filter(Boolean).map(p => p[0].toUpperCase()).slice(0, 2).join('');
        }

        function formatDate(iso) {
            if (!iso) return '—';
            return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function renderAccount(user) {
            const meta = user.user_metadata || {};
            const firstName = meta.first_name || '';
            const lastName = meta.last_name || '';
            const fullName = [firstName, lastName].filter(Boolean).join(' ') || 'Vantage Customer';
            const initialsText = initials(fullName);

            document.getElementById('account-initials').textContent = initialsText;
            document.getElementById('account-name').textContent = fullName;
            document.getElementById('account-created').textContent = formatDate(user.created_at);

            document.getElementById('page-welcome').textContent = firstName ? `Welcome back, ${fullName}` : 'Welcome back';

            document.getElementById('drawer-initials').textContent = initialsText;
            document.getElementById('drawer-name').textContent = fullName;

            // Render email and phone numbers directly underneath the drawer logo
            document.getElementById('drawer-email-top').textContent = user.email || '—';
            document.getElementById('drawer-phone-top').textContent = meta.phone || 'Not provided';
        }

        async function checkSessionAndInit() {
            try {
                const { data, error } = await supabaseClient.auth.getSession();
                if (error || !data.session) {
                    window.location.href = 'index.html';
                    return;
                }
                renderAccount(data.session.user);
                renderShipments();

                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('app').classList.add('is-ready');
            } catch (err) {
                console.error('Session check failed:', err);
                window.location.href = 'index.html';
            }
        }

        // Keep the dashboard in sync if the user signs out in another tab
        supabaseClient.auth.onAuthStateChange((event) => {
            if (event === 'SIGNED_OUT') {
                window.location.href = 'index.html';
            }
        });

        // ---- Account drawer open/close ----
        const drawer = document.getElementById('account-drawer');
        const drawerOverlay = document.getElementById('drawer-overlay');
        const accountTrigger = document.getElementById('account-trigger');
        const drawerClose = document.getElementById('drawer-close');

        function openDrawer() {
            drawer.classList.add('is-open');
            drawerOverlay.classList.add('is-open');
        }
        function closeDrawer() {
            drawer.classList.remove('is-open');
            drawerOverlay.classList.remove('is-open');
        }

        accountTrigger.addEventListener('click', openDrawer);
        drawerClose.addEventListener('click', closeDrawer);
        drawerOverlay.addEventListener('click', closeDrawer);
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

        drawer.querySelectorAll('.drawer-link[data-anchor]').forEach(link => {
            link.addEventListener('click', () => {
                closeDrawer();
                const target = document.querySelector(link.getAttribute('data-anchor'));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        document.getElementById('drawer-signout').addEventListener('click', async (e) => {
            const btn = e.currentTarget;
            btn.disabled = true;
            btn.style.opacity = '0.6';
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        });

        checkSessionAndInit();
    </script>
</body>
</html>
